<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pop & Play — tap, hear, and collect stickers!</title>
<meta name="description" content="A tap-and-pop playground for ages 1–2: every tap speaks, pops confetti, and earns stickers for your very own sticker scene. No logins, no ads.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%2387ceeb'/%3E%3Ctext x='32' y='45' font-size='34' text-anchor='middle'%3E🎈%3C/text%3E%3C/svg%3E">
<script>
const GA_ID="";
if(GA_ID){const s=document.createElement('script');s.async=true;s.src='https://www.googletagmanager.com/gtag/js?id='+GA_ID;document.head.appendChild(s);window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments)}gtag('js',new Date());gtag('config',GA_ID);}
</script>
<style>
:root{--sky1:#8fd3f4;--sky2:#fdf3c0;--card:#ffffff;--ink:#3a3357;--pink:#ff7eb9;--mint:#5fe0b7;--sun:#ffd76b;--pop:#ff9f68}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{margin:0;height:100%;overflow:hidden}
body{font-family:"Comic Sans MS","Chalkboard SE",system-ui,sans-serif;background:linear-gradient(180deg,var(--sky1),var(--sky2));color:var(--ink);touch-action:manipulation}
button{font-family:inherit;border:none;cursor:pointer}

/* header */
header{height:74px;display:flex;align-items:center;gap:10px;padding:0 14px;position:relative;z-index:30}
.jar{margin-left:auto;background:#fff;border-radius:999px;padding:9px 18px;font-size:22px;font-weight:900;box-shadow:0 5px 0 rgba(58,51,87,.15);display:flex;align-items:center;gap:8px;transition:transform .15s}
.jar.bump{transform:scale(1.22) rotate(-4deg)}
.tabs{display:flex;gap:8px}
.tab{font-size:17px;font-weight:900;background:rgba(255,255,255,.6);color:var(--ink);border-radius:999px;padding:12px 18px;box-shadow:0 5px 0 rgba(58,51,87,.12);transition:transform .1s}
.tab.on{background:#fff;transform:translateY(-2px)}
.tab:active{transform:scale(.94)}

/* play grid */
#playPage{height:calc(100% - 74px);display:flex;flex-direction:column;padding:6px 12px 14px}
#hint{ text-align:center;font-size:20px;font-weight:900;color:#fff;text-shadow:0 2px 0 rgba(58,51,87,.25);margin:2px 0 6px;animation:hintbob 1.2s ease-in-out infinite}
@keyframes hintbob{0%,100%{transform:translateY(0)}50%{transform:translateY(8px)}}
#grid{flex:1;display:grid;grid-template-columns:1fr 1fr;grid-auto-rows:1fr;gap:12px;min-height:0}
@media(min-width:640px){#grid{grid-template-columns:repeat(3,1fr)}}
.bub{position:relative;background:radial-gradient(circle at 32% 28%,#ffffff,#f2f7ff 55%,#dbe9ff);border-radius:32px;box-shadow:0 8px 0 rgba(58,51,87,.14), inset 0 -8px 14px rgba(120,150,220,.18);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;font-weight:900;overflow:hidden;animation:bob 3.2s ease-in-out infinite}
.bub:nth-child(2n){animation-delay:.6s}.bub:nth-child(3n){animation-delay:1.1s}
@keyframes bob{0%,100%{transform:translateY(0) rotate(-.6deg)}50%{transform:translateY(-7px) rotate(.8deg)}}
.bub .e{font-size:clamp(52px,13vw,88px);line-height:1;filter:drop-shadow(0 4px 3px rgba(58,51,87,.18))}
.bub .w{font-size:clamp(15px,3.6vw,22px);color:#7a6fb0}
.bub.popping{animation:popout .38s ease forwards}
@keyframes popout{40%{transform:scale(1.22)}100%{transform:scale(0);opacity:0}}

/* balloon */
.balloon{position:fixed;bottom:-140px;font-size:96px;z-index:40;cursor:pointer;filter:drop-shadow(0 6px 5px rgba(58,51,87,.25));animation:floatup 7s linear forwards}
@keyframes floatup{to{transform:translateY(-130vh)}}
.balloon i{display:block;animation:sway 1.6s ease-in-out infinite;font-style:normal}
@keyframes sway{0%,100%{transform:rotate(-7deg)}50%{transform:rotate(7deg)}}

/* confetti + burst word */
.cf{position:fixed;top:-24px;z-index:50;font-size:22px;pointer-events:none;animation:cfall linear forwards}
@keyframes cfall{to{transform:translateY(115vh) rotate(720deg)}}
#burst{position:fixed;left:50%;top:38%;transform:translate(-50%,-50%) scale(0);z-index:60;font-size:clamp(40px,9vw,72px);font-weight:900;color:#fff;text-shadow:0 4px 0 rgba(58,51,87,.3);pointer-events:none}
#burst.go{animation:burst .9s ease forwards}
@keyframes burst{25%{transform:translate(-50%,-50%) scale(1.25)}55%{transform:translate(-50%,-50%) scale(1)}100%{transform:translate(-50%,-50%) scale(.9);opacity:0}}

/* sticker page */
#stickPage{display:none;height:calc(100% - 74px);flex-direction:column;padding:0 12px 12px}
#scene{flex:1;position:relative;border-radius:28px;overflow:hidden;box-shadow:0 8px 0 rgba(58,51,87,.14);background:linear-gradient(180deg,#a7e0ff 0%,#d9f3ff 46%,#b9ea9a 46.5%,#8fd672 100%);min-height:0}
#scene .sun{position:absolute;right:8%;top:7%;font-size:64px;animation:spin 24s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#scene .cl{position:absolute;font-size:52px;opacity:.9;animation:drift 30s linear infinite}
@keyframes drift{from{transform:translateX(-140px)}to{transform:translateX(110vw)}}
.stamp{position:absolute;font-size:46px;transform:translate(-50%,-50%);filter:drop-shadow(0 3px 2px rgba(58,51,87,.25));animation:plop .3s ease}
@keyframes plop{0%{transform:translate(-50%,-50%) scale(0)}70%{transform:translate(-50%,-50%) scale(1.3)}100%{transform:translate(-50%,-50%) scale(1)}}
#trayWrap{margin-top:10px}
#trayLbl{font-size:15px;font-weight:900;color:#7a6fb0;margin:0 0 6px 4px}
#tray{display:flex;gap:8px;overflow-x:auto;padding:6px 4px 10px;scrollbar-width:thin}
.tst{flex:none;width:62px;height:62px;border-radius:18px;background:#fff;box-shadow:0 4px 0 rgba(58,51,87,.13);font-size:34px;display:grid;place-items:center;transition:transform .12s}
.tst.sel{transform:scale(1.18);box-shadow:0 0 0 4px var(--pink),0 4px 0 rgba(58,51,87,.13)}
#clearBtn{position:absolute;right:10px;top:10px;z-index:5;background:rgba(255,255,255,.85);border-radius:999px;padding:8px 14px;font-size:14px;font-weight:900;color:#7a6fb0}
#emptyTray{font-size:15px;color:#7a6fb0;font-weight:700;padding:8px 4px}

/* grown-ups */
#gearBtn{position:fixed;left:10px;bottom:10px;z-index:70;background:rgba(255,255,255,.55);border-radius:50%;width:40px;height:40px;font-size:18px;opacity:.65}
#gpanel{position:fixed;inset:0;z-index:80;display:none;place-items:center;background:rgba(58,51,87,.55)}
#gpanel.on{display:grid}
#gcard{background:#fff;border-radius:24px;padding:24px;width:min(92vw,380px);text-align:center}
#gcard h2{margin:0 0 8px}
#gcard p{font-size:14px;color:#7a6fb0;margin:6px 0}
#gcard button{background:var(--pink);color:#fff;font-weight:900;font-size:15px;border-radius:999px;padding:12px 20px;margin:6px 4px}
#gcard button.soft{background:#eee;color:var(--ink)}
@media(prefers-reduced-motion:reduce){*{animation:none!important}}
</style>
</head>
<body>
<header>
  <div class="tabs">
    <button class="tab on" id="tabPlay">🎈 Play</button>
    <button class="tab" id="tabStick">🖼 My stickers</button>
  </div>
  <div class="jar" id="jar">⭐ <span id="jarN">0</span></div>
</header>

<div id="playPage">
  <div id="hint">👇 Tap anything!</div>
  <div id="grid"></div>
</div>

<div id="stickPage">
  <div id="scene">
    <span class="sun">🌞</span>
    <span class="cl" style="top:12%;animation-delay:-4s">☁️</span>
    <span class="cl" style="top:26%;animation-delay:-16s">☁️</span>
    <button id="clearBtn">🧽 Clear</button>
  </div>
  <div id="trayWrap">
    <p id="trayLbl">Pick a sticker, then tap the picture to place it!</p>
    <div id="tray"></div>
  </div>
</div>

<div id="burst"></div>
<button id="gearBtn" aria-label="Grown-ups">⚙</button>
<div id="gpanel"><div id="gcard">
  <h2>Grown-ups corner</h2>
  <p>Pop & Play v1.0 · ages 1–2 · a Boundless learning studio.<br>Every tap is spoken aloud. Stickers earn a sticker-scene. No ads, no logins — progress stays on this device.</p>
  <button id="resetBtn">Start fresh (reset all)</button>
  <button class="soft" id="gClose">Close</button>
</div></div>

<script>
/* ================= POP & PLAY v1.0 ================= */
const $=id=>document.getElementById(id);
const KEY='popplay.v1';
let S=Object.assign({n:0,inv:[],board:[]},(()=>{try{return JSON.parse(localStorage.getItem(KEY))||{}}catch(e){return{}}})());
function save(){try{localStorage.setItem(KEY,JSON.stringify(S))}catch(e){}}

/* ---- things to tap ---- */
const POOLS=[
 ...'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').map(l=>['🔤'+l,l]),
 [['1️⃣','One'],['2️⃣','Two'],['3️⃣','Three'],['4️⃣','Four'],['5️⃣','Five'],['6️⃣','Six'],['7️⃣','Seven'],['8️⃣','Eight'],['9️⃣','Nine'],['🔟','Ten']],
 [['🐶','Dog'],['🐱','Cat'],['🐮','Cow'],['🐷','Pig'],['🐤','Chick'],['🦆','Duck'],['🐰','Bunny'],['🐸','Frog'],['🐘','Elephant'],['🦁','Lion'],['🐵','Monkey'],['🐢','Turtle'],['🦋','Butterfly'],['🐝','Bee'],['🐠','Fish'],['🦉','Owl']],
 [['🍎','Apple'],['🍌','Banana'],['🍓','Strawberry'],['🍊','Orange'],['🍇','Grapes'],['🥕','Carrot'],['🧀','Cheese'],['🥛','Milk'],['🍞','Bread'],['🍉','Watermelon'],['🥦','Broccoli'],['🍪','Cookie']],
 [['🌸','Flower'],['🌳','Tree'],['🌈','Rainbow'],['⭐','Star'],['🌙','Moon'],['☀️','Sun'],['☁️','Cloud'],['🍂','Leaf'],['🐚','Seashell'],['❄️','Snowflake']],
 [['🚗','Car'],['🚌','Bus'],['🚂','Train'],['✈️','Airplane'],['🚜','Tractor'],['⛵','Boat'],['🚒','Fire truck'],['🚲','Bicycle']],
 [['🔴','Red'],['🔵','Blue'],['🟡','Yellow'],['🟢','Green'],['🟣','Purple'],['🟠','Orange'],['❤️','Heart'],['⚪','Circle']]
];
const LETTERS=POOLS.slice(0,26); const CATS=POOLS.slice(26);
function randItem(){
  if(Math.random()<0.28){const L=LETTERS[Math.floor(Math.random()*26)];return [L[0].slice(2),L[1]];}
  const cat=CATS[Math.floor(Math.random()*CATS.length)];
  const it=cat[Math.floor(Math.random()*cat.length)];return it;
}
const SURPRISES=[['🦄','A unicorn!'],['🎂','Birthday cake!'],['🐣','A baby chick!'],['🌟','A shooting star!'],['🧸','A teddy bear!'],['🍭','A lollipop!'],['🐬','A dolphin!'],['👑','A crown!'],['🎁','A present!'],['🪅','A piñata!']];

/* ---- speech + sound ---- */
let VOICE=null;
if('speechSynthesis' in window){
  const pick=()=>{const v=speechSynthesis.getVoices();VOICE=v.find(x=>/en/i.test(x.lang)&&/female|samantha|zira|google us/i.test(x.name))||v.find(x=>/en/i.test(x.lang))||v[0]||null;};
  pick(); speechSynthesis.onvoiceschanged=pick;
}
function speak(t){
  if(!('speechSynthesis' in window))return;
  try{speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t);
  if(VOICE)u.voice=VOICE;u.rate=.86;u.pitch=1.25;speechSynthesis.speak(u);}catch(e){}
}
let AC=null;
function pop(freq){
  try{AC=AC||new (window.AudioContext||window.webkitAudioContext)();
  const o=AC.createOscillator(),g=AC.createGain();
  o.frequency.setValueAtTime(freq||520,AC.currentTime);
  o.frequency.exponentialRampToValueAtTime((freq||520)*2.1,AC.currentTime+.09);
  g.gain.setValueAtTime(.24,AC.currentTime);g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+.16);
  o.connect(g);g.connect(AC.destination);o.start();o.stop(AC.currentTime+.17);}catch(e){}
}

/* ---- confetti + burst ---- */
const CFE=['🎉','⭐','💛','💙','💗','✨','🌟','💚'];
function confetti(n){
  for(let i=0;i<n;i++){
    const d=document.createElement('div');d.className='cf';
    d.textContent=CFE[Math.floor(Math.random()*CFE.length)];
    d.style.left=Math.random()*96+'vw';
    d.style.fontSize=(16+Math.random()*20)+'px';
    d.style.animationDuration=(1.4+Math.random()*1.4)+'s';
    document.body.appendChild(d);
    setTimeout(()=>d.remove(),3000);
  }
}
function burst(t){const b=$('burst');b.textContent=t;b.classList.remove('go');void b.offsetWidth;b.classList.add('go');}

/* ---- sticker jar ---- */
function award(emoji,k){
  S.n+=k; if(S.inv.length<400)for(let i=0;i<k;i++)S.inv.push(emoji);
  save();
  $('jarN').textContent=S.n;
  const j=$('jar');j.classList.remove('bump');void j.offsetWidth;j.classList.add('bump');
}

/* ---- play grid ---- */
let taps=0, nextBalloon=5+Math.floor(Math.random()*4), firstTap=false;
function makeBub(){
  const [e,w]=randItem();
  const b=document.createElement('button');b.className='bub';
  b.innerHTML=`<span class="e">${e}</span><span class="w">${w}</span>`;
  b.onclick=()=>{
    if(!firstTap){firstTap=true;$('hint').style.display='none';}
    speak(w+'!'); pop(420+Math.random()*300); confetti(10); burst(e);
    award(e,1);
    b.classList.add('popping');
    taps++;
    setTimeout(()=>{const nb=makeBub();b.replaceWith(nb);},360);
    if(taps>=nextBalloon){taps=0;nextBalloon=5+Math.floor(Math.random()*5);setTimeout(launchBalloon,700);}
  };
  return b;
}
function fillGrid(){
  const g=$('grid');g.innerHTML='';
  const n=window.innerWidth>=640?6:6;
  for(let i=0;i<n;i++)g.appendChild(makeBub());
}
function launchBalloon(){
  if(document.querySelector('.balloon'))return;
  const cols=['🎈','🎈','🎈','🟡','💜'];
  const d=document.createElement('div');d.className='balloon';
  d.style.left=(8+Math.random()*70)+'vw';
  d.innerHTML='<i>🎈</i>';
  d.onclick=()=>{
    const s=SURPRISES[Math.floor(Math.random()*SURPRISES.length)];
    pop(760); pop(300); confetti(26); burst(s[0]);
    speak('Pop! Surprise! '+s[1]);
    award(s[0],3);
    d.remove();
  };
  document.body.appendChild(d);
  setTimeout(()=>d.remove(),7200);
}

/* ---- sticker scene ---- */
let SEL=null;
function renderTray(){
  const uniq=[...new Set(S.inv)].slice(-40).reverse();
  const t=$('tray');
  if(!uniq.length){t.innerHTML='<div id="emptyTray">Tap things on the Play page to earn stickers! 🎈</div>';return;}
  t.innerHTML=uniq.map(e=>`<button class="tst ${SEL===e?'sel':''}" data-e="${e}">${e}</button>`).join('');
  t.querySelectorAll('.tst').forEach(b=>b.onclick=()=>{SEL=b.dataset.e;speak(''); pop(600); renderTray();});
}
function renderBoard(){
  document.querySelectorAll('#scene .stamp').forEach(x=>x.remove());
  S.board.forEach(st=>{
    const d=document.createElement('span');d.className='stamp';d.textContent=st.e;
    d.style.left=st.x+'%';d.style.top=st.y+'%';
    $('scene').appendChild(d);
  });
}
$('scene').addEventListener('click',e=>{
  if(e.target.id==='clearBtn')return;
  if(!SEL){speak('Pick a sticker first!');return;}
  const r=$('scene').getBoundingClientRect();
  const x=((e.clientX-r.left)/r.width*100).toFixed(1), y=((e.clientY-r.top)/r.height*100).toFixed(1);
  S.board.push({e:SEL,x,y}); if(S.board.length>90)S.board.shift();
  save(); pop(500+Math.random()*300); confetti(6); renderBoard();
});
$('clearBtn').onclick=()=>{S.board=[];save();renderBoard();speak('All clean!');pop(350);};

/* ---- tabs ---- */
function showPlay(){$('playPage').style.display='flex';$('stickPage').style.display='none';
  $('tabPlay').classList.add('on');$('tabStick').classList.remove('on');}
function showStick(){$('playPage').style.display='none';$('stickPage').style.display='flex';
  $('tabStick').classList.add('on');$('tabPlay').classList.remove('on');
  renderTray();renderBoard();speak('Your stickers! Pick one, then tap the picture!');}
$('tabPlay').onclick=()=>{pop(480);showPlay();};
$('tabStick').onclick=()=>{pop(560);showStick();};

/* ---- grown-ups ---- */
let gT=null;
$('gearBtn').addEventListener('pointerdown',()=>{gT=setTimeout(()=>$('gpanel').classList.add('on'),900);});
$('gearBtn').addEventListener('pointerup',()=>clearTimeout(gT));
$('gearBtn').addEventListener('pointerleave',()=>clearTimeout(gT));
$('gClose').onclick=()=>$('gpanel').classList.remove('on');
$('resetBtn').onclick=()=>{S={n:0,inv:[],board:[]};save();$('jarN').textContent=0;renderTray();renderBoard();$('gpanel').classList.remove('on');};

/* ---- boot ---- */
$('jarN').textContent=S.n;
fillGrid();
addEventListener('resize',()=>{ if($('playPage').style.display!=='none')fillGrid(); });
</script>
</body>
</html>
